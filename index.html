<script>

function showResult() {

let regNo = document.getElementById("regNo").value.trim();
let resultArea = document.getElementById("result-area");

if (!studentDB[regNo]) {
resultArea.innerHTML = "<div class='error'>Result Not Found</div>";
return;
}

let student = studentDB[regNo];
let passCount = 0;
let failCount = 0;

let rows = "";

student.results.forEach(sub => {

let resClass = sub.res == "P" ? "green-text" : "red-text";

if(sub.res=="P"){passCount++} else{failCount++}

rows += `
<tr>
<td>${sub.code}</td>
<td>${sub.name}</td>
<td>${sub.cia}</td>
<td>${sub.see}</td>
<td>${sub.total}</td>
<td class="${resClass}">${sub.res}</td>
</tr>
`;

});

resultArea.innerHTML = `

<div class="card" id="resultCard">

<div class="student-title">
Name : ${student.name} <br>
Hall Ticket : ${regNo}
</div>

<table>

<tr>
<th>Code</th>
<th>Subject</th>
<th>CIA</th>
<th>SEE</th>
<th>Total</th>
<th>Result</th>
</tr>

${rows}

</table>

<div class="summary">

<div class="summary-item">
<div class="label">PASS</div>
<div class="value pass-value">${passCount}</div>
</div>

<div class="summary-item">
<div class="label">FAIL</div>
<div class="value fail-value">${failCount}</div>
</div>

</div>

<br>

<button onclick="printResult()">Print</button>

<button onclick="downloadResult()">Download</button>

<button onclick="applyRevaluation()">Apply Revaluation</button>

</div>

`;

}
  <script>

function printResult(){

let content = document.getElementById("resultCard").innerHTML;

let printWindow = window.open('', '', 'width=900,height=650');

printWindow.document.write("<html><head><title>Result</title></head><body>");
printWindow.document.write(content);
printWindow.document.write("</body></html>");

printWindow.document.close();
printWindow.print();

}

</script>
<script>

function downloadResult(){

let element = document.getElementById("resultCard");

let opt = {
margin:1,
filename:'JKC_Result.pdf',
image:{ type:'jpeg', quality:0.98 },
html2canvas:{ scale:2 },
jsPDF:{ unit:'in', format:'letter', orientation:'portrait' }
};

html2pdf().set(opt).from(element).save();

}

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>

function applyRevaluation(){

let fee = 200;

let confirmPay = confirm("Revaluation fee ₹200 per subject. Continue?");

if(confirmPay){

alert("Revaluation Application Submitted Successfully");

}

}

</script>
