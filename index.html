<!DOCTYPE html>
<html>
<head>
<title>JKC College Results Portal</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
text-align:center;
}

h1{color:red;margin-bottom:5px;}

.subtitle{color:#555;margin-bottom:30px;}

.searchbox{margin-bottom:20px;}

input{padding:10px;font-size:16px;}

button{padding:10px 15px;margin:5px;cursor:pointer;}

#resultBox{margin-top:20px;}

.student-info{
background:white;
padding:15px;
width:900px;
margin:auto;
border-radius:6px;
box-shadow:0 0 5px #ccc;
text-align:left;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{background:#eee;}

.pass{color:green;font-weight:bold;}
.fail{color:red;font-weight:bold;}

.actions{margin-top:15px;}

.reval-box{
background:white;
padding:20px;
width:900px;
margin:30px auto;
border-radius:6px;
box-shadow:0 0 5px #ccc;
text-align:left;
}
html+=`

<div class="reval-box">

<h3>Apply For Revaluation</h3>

<b>Registration Number :</b> ${reg}

<br><br>

`;

student.results.forEach(r=>{

html+=`

<div class="subject-row">

<label>
<input type="checkbox" class="revsub" value="${r.name}">
${r.name}
</label>

<span>₹750</span>

</div>

`;

});

html+=`

<br>

<button onclick="applyRevaluation('${reg}')">Proceed To Payment</button>

</div>

`;
.subject-row{
display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
padding:8px;
}
</style>

</head>

<body>

<h1>JKC COLLEGE RESULTS PORTAL</h1>
<div class="subtitle">Jagarlamudi Kuppuswamy Choudary College</div>

<div class="searchbox">
<input type="text" id="regno" placeholder="Enter Registration Number">
<button onclick="showResult()">Check Result</button>
</div>

<div id="resultBox"></div>

<script>

const studentDB={

"250701":{
name:"SUPRIYA VANKAYALAPATI",
results:[
{code:"100125",name:"ENGLISH BRIDGE-I: LIFE SKILLS",total:60,res:"P"},
{code:"100225",name:"SAHITHI VASANTHAM",total:71,res:"P"},
{code:"101125",name:"AI FUNDAMENTALS",total:62,res:"P"},
{code:"111925",name:"COMPUTER FUNDAMENTALS AND OFFICE AUTOMATION",total:44,res:"P"},
{code:"1119P25",name:"COMPUTER FUNDAMENTALS LAB",total:32,res:"P"},
{code:"112025",name:"PROBLEM SOLVING USING C",total:60,res:"P"},
{code:"1120P25",name:"C LAB",total:30,res:"P"}
]
},

"250702":{
name:"ACHARAM GNANA LAKSHMI SOUNDARYA",
results:[
{code:"100125",name:"ENGLISH BRIDGE-I",total:67,res:"P"},
{code:"100225",name:"SAHITHI VASANTHAM",total:77,res:"P"},
{code:"101125",name:"AI FUNDAMENTALS",total:64,res:"P"},
{code:"111925",name:"COMPUTER FUNDAMENTALS",total:45,res:"P"},
{code:"1119P25",name:"COMPUTER LAB",total:31,res:"P"},
{code:"112025",name:"C PROGRAMMING",total:55,res:"P"},
{code:"1120P25",name:"C LAB",total:30,res:"P"}
]
}

};

function showResult(){

let reg=document.getElementById("regno").value.trim();
let student=studentDB[reg];
let box=document.getElementById("resultBox");

if(!student){
box.innerHTML="<h3 style='color:red'>Student Not Found</h3>";
return;
}

let total=0;

let html="";

html+=`
<div class="student-info">

<b>Student Name :</b> ${student.name}<br>
<b>Registration Number :</b> ${reg}

<table>
<tr>
<th>Subject</th>
<th>Marks</th>
<th>Status</th>
</tr>
`;

student.results.forEach(r=>{

let status=r.res=="P"?"PASS":"FAIL";
let cls=r.res=="P"?"pass":"fail";

total+=r.total;

html+=`
<tr>
<td>${r.name}</td>
<td>${r.total}</td>
<td class="${cls}">${status}</td>
</tr>
`;

});

html+=`</table>

<h3>Total Marks : ${total}</h3>

<div class="actions">
<button onclick="window.print()">Print Result</button>
<button onclick="downloadResult()">Download Result</button>
</div>

</div>
`;

box.innerHTML=html;

}

function downloadResult(){

let content=document.getElementById("resultBox").innerText;

let blob=new Blob([content],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="JKC_Result.txt";
a.click();

}

</script>

</body>
</html>
