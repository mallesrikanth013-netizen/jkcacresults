<!DOCTYPE html>
<html>
<head>

<title>JKC College Results</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:400px;
margin:80px auto;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px gray;
}

input{
padding:10px;
width:200px;
margin:10px;
}

button{
padding:10px 20px;
background:#1a237e;
color:white;
border:none;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h2>JKC COLLEGE RESULTS PORTAL</h2>

<div class="box">

<input type="text" id="regNo" placeholder="Enter Hall Ticket">

<br>

<button onclick="showResult()">Check Result</button>

</div>

<div id="result-area"></div>

<script>

const studentDB={

"250726":{
name:"Sample Student",
results:[
{code:"1001",name:"English",cia:"24/40",see:"44/60",total:68,res:"P"},
{code:"1002",name:"Sanskrit",cia:"20/40",see:"30/60",total:50,res:"P"},
{code:"1003",name:"AI Fundamentals",cia:"22/40",see:"25/60",total:47,res:"P"}
]
},

/* ======================
ADD NEXT STUDENT HERE
====================== */

"250727":{
name:"Next Student",
results:[
{code:"1001",name:"English",cia:"20/40",see:"30/60",total:50,res:"P"},
{code:"1002",name:"Sanskrit",cia:"18/40",see:"20/60",total:38,res:"F"},
{code:"1003",name:"AI Fundamentals",cia:"22/40",see:"30/60",total:52,res:"P"}
]
}

};

function showResult(){

let reg=document.getElementById("regNo").value;

let area=document.getElementById("result-area");

if(!studentDB[reg]){

area.innerHTML="<h3>Result Not Found</h3>";

return;

}

let student=studentDB[reg];

let rows="";

student.results.forEach(s=>{

let cls=s.res=="P"?"pass":"fail";

rows+=`
<tr>
<td>${s.code}</td>
<td>${s.name}</td>
<td>${s.cia}</td>
<td>${s.see}</td>
<td>${s.total}</td>
<td class="${cls}">${s.res}</td>
</tr>
`;

});

area.innerHTML=`

<div id="resultCard">

<h3>${student.name}</h3>
<h4>Hall Ticket : ${reg}</h4>

<table>

<tr>
<th>Code</th>
<th>Subject</th>
<th>CIA</th>
<th>SEE</th>
<th>Total</th>
<th>Result</th>
</tr>

${rows}

</table>

<br>

<button onclick="printResult()">Print</button>

<button onclick="downloadResult()">Download PDF</button>

<button onclick="revaluation()">Apply Revaluation</button>

</div>

`;

}

function printResult(){

let data=document.getElementById("resultCard").innerHTML;

let w=window.open();

w.document.write(data);

w.print();

}

function downloadResult(){

let element=document.getElementById("resultCard");

html2pdf().from(element).save("JKC_Result.pdf");

}

function revaluation(){

alert("Revaluation fee ₹200 per subject");

}

</script>

</body>

</html>
